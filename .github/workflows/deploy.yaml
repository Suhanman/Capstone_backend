name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: email-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.CAPSTONE_CI_VAR }}
          password: ${{ secrets.CAPSTONE_CI_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.CAPSTONE_CI_VAR }}/${{ env.IMAGE_NAME }}:latest
            ${{ vars.CAPSTONE_CI_VAR }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Checkout Cluster repo
        uses: actions/checkout@v4
        with:
          repository: GachonCapstone4/Capstone_Cluster
          token: ${{ secrets.CAPSTONE_CD_SECRET}}  # 별도 PAT 필요
          path: cluster-repo

      - name: Update image tag in deployment
        run: |
          sed -i "s|image: ${{ vars.CAPSTONE_CI_VAR }}/${{ env.IMAGE_NAME }}:.*|image: ${{ vars.CAPSTONE_CI_VAR }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|" \
            cluster-repo/backend-manifest/05-backend-deployment.yaml

      - name: Commit and push updated manifest
        run: |
          cd cluster-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add backend-manifest/05-backend-deployment.yaml
          git commit -m "ci: update backend image tag to ${{ github.sha }}"
          git push


