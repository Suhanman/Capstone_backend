spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/email_agent?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    virtual-host: /

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  expiration: 86400000       # 24시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

app:
  file:
    upload-dir: C:/dev/uploads   # 파일 업로드 저장 경로
  rabbitmq:
    exchange:
      app2ai: x.app2ai.direct
      ai2app: x.ai2app.direct
    queue:
      classify-inbound: q.2ai.classify
      classify-result: q.2app.classify
      draft-inbound: q.2ai.draft
      draft-result: q.2app.draft
      dlx-failed: q.dlx.failed
    routing-key:
      classify-inbound: 2ai.classify
      classify-result: 2app.classify
      draft-inbound: 2ai.draft
      draft-result: 2app.draft

  ai:
    server-url: ${AI_SERVER_URL}
    api-key: ${AI_API_KEY:}

  sse:
    pods: ${SSE_POD_0_URL},${SSE_POD_1_URL}

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
    calendar-id: primary
    topic-name: ${GOOGLE_TOPIC_NAME}
    frontend:
      base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
    email-integration-path: ${APP_FRONTEND_EMAIL_INTEGRATION_PATH:/app/settings?tab=email

  webhook:
    pubsub-verify-token: ${PUBSUB_VERIFY_TOKEN}

server:
  port: 8080

logging:
  level:
    com.emailagent: DEBUG
    org.springframework.security: INFO
