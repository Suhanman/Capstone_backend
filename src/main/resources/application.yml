spring:
  datasource:
    url: jdbc:mariadb://localhost:3308/email_agent?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root1234}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  expiration: 86400000       # 24시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

app:
  file:
    upload-dir: C:/dev/uploads   # 파일 업로드 저장 경로
  rabbitmq:
    exchange: email.exchange
    queue:
      classify: email.classify
      draft: email.draft
    routing-key:
      classify: email.classify
      draft: email.draft

  ai:
    server-url: ${AI_SERVER_URL:http://localhost:8000}
    api-key: ${AI_API_KEY:}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/integrations/google/callback}
    calendar-id: primary

server:
  port: 8080

logging:
  level:
    com.email-agent: DEBUG
    org.springframework.security: INFO
