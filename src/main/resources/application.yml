spring:
  datasource:
    url: jdbc:mariadb://192.168.3.10:3306/email_agent?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:capstone}
    password: ${DB_PASSWORD:capstone}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.2.20}
    port: 30672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASS:admin1234!}
    virtual-host: /

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  expiration: 86400000       # 24시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

app:
  file:
    upload-dir: C:/dev/uploads   # 파일 업로드 저장 경로
  rabbitmq:
    exchange:
      app2ai: x.app2ai.direct
      ai2app: x.ai2app.direct
    queue:
      classify-inbound: q.2ai.classify
      classify-result: q.2app.classify
      draft-inbound: q.2ai.draft
      draft-result: q.2app.draft
      dlx-failed: q.dlx.failed
    routing-key:
      classify-inbound: 2ai.classify
      classify-result: 2app.classify
      draft-inbound: 2ai.draft
      draft-result: 2app.draft

  ai:
    server-url: ${AI_SERVER_URL:http://localhost:8000}
    api-key: ${AI_API_KEY:}

  sse:
    pods: ${SSE_POD_0_URL:http://localhost:8080},${SSE_POD_1_URL:http://localhost:8081}

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/integrations/google/callback}
    calendar-id: primary
    topic-name: ${GOOGLE_TOPIC_NAME}

  webhook:
    pubsub-verify-token: ${PUBSUB_VERIFY_TOKEN}

server:
  port: 8080

logging:
  level:
    com.emailagent: DEBUG
    com.emailagent.rabbitmq: DEBUG
    org.springframework.security: INFO
