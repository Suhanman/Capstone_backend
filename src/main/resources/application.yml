spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/email_agent?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    virtual-host: /
  servlet:
    multipart:
      max-file-size: ${APP_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${APP_MULTIPART_MAX_REQUEST_SIZE:10MB}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  expiration: 86400000       # 24시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

app:
  file:
    upload-dir: C:/dev/uploads   # 파일 업로드 저장 경로
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
    oauth-callback-path: ${APP_FRONTEND_OAUTH_CALLBACK_PATH:/oauth/google/callback}
  rabbitmq:
    exchange:
      app2ai: x.app2ai.direct
      ai2app: x.ai2app.direct
      app2rag: x.app2rag.direct
      rag2app: x.rag2app.direct
    queue:
      classify-inbound: q.2ai.classify
      classify-result: q.2app.classify
      knowledge-ingest-inbound: q.2rag.knowledge.ingest
      knowledge-ingest-result: q.2app.knowledge.ingest
      rag-draft-inbound: q.2rag.draft
      rag-draft-result: q.2app.rag.draft
      template-index-inbound: q.2rag.templates.index
      template-index-result: q.2app.templates.index
      template-match-inbound: q.2rag.templates.match
      template-match-result: q.2app.templates.match
      rag-progress: q.2app.rag.progress
      dlx-failed: q.dlx.failed
    routing-key:
      classify-inbound: 2ai.classify
      classify-result: 2app.classify
      knowledge-ingest-inbound: 2rag.knowledge.ingest
      knowledge-ingest-result: 2app.knowledge.ingest
      rag-draft-inbound: 2rag.draft
      rag-draft-result: 2app.rag.draft
      template-index-inbound: 2rag.templates.index
      template-index-result: 2app.templates.index
      template-match-inbound: 2rag.templates.match
      template-match-result: 2app.templates.match
      rag-progress: 2app.rag.progress

  ai:
    server-url: ${AI_SERVER_URL}
    api-key: ${AI_API_KEY:}

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
    calendar-id: primary
    topic-name: ${GOOGLE_TOPIC_NAME}

  kubernetes:
    namespace: ${K8S_NAMESPACE:job}
    job-image: ${K8S_TRAINING_JOB_IMAGE:placeholder}
    ttl-seconds-after-finished: 300

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY} # 환경 변수로 관리 권장
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ap-northeast-2 # 버킷이 생성된 리전
      s3:
        bucket: capstone-gachon
        prefix: ${S3_PREFIX:rag/client}



  webhook:
    pubsub-verify-token: ${PUBSUB_VERIFY_TOKEN}

server:
  port: 8080

logging:
  level:
    com.emailagent: DEBUG
    org.springframework.security: INFO
